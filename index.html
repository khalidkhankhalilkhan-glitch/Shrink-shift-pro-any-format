<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1e40af" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ShrinkShift" />
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" />
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="manifest" href="/manifest.json" crossorigin="use-credentials" />
    <title>ShrinkShift - Bulk Image Compressor</title>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Delaying registration slightly to ensure PWABuilder's initial scan finds the link
          setTimeout(() => {
            navigator.serviceWorker.register('/sw.js', { scope: '/' })
              .then(() => console.log('SW Registered'))
              .catch(err => console.error('SW Error', err));
          }, 1000);
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
