<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline | ShrinkShift Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #1e40af; color: white; font-family: sans-serif; }
        .logo-box { border: 2px solid rgba(255,255,255,0.2); border-radius: 20px; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }
        .pulse { animation: pulse 3s infinite ease-in-out; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6 text-center overflow-hidden">
    <div class="logo-box p-8 mb-8 pulse bg-white/10">
        <svg viewBox="0 0 100 100" class="w-24 h-24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="20" y="20" width="60" height="60" rx="15" stroke="white" stroke-width="8" />
            <path d="M35 50H65M50 35V65" stroke="white" stroke-width="10" stroke-linecap="round" />
        </svg>
    </div>
    <h1 class="text-4xl font-black uppercase tracking-tighter mb-2">SHRINKSHIFT <span class="text-blue-300">PRO</span></h1>
    <p class="text-blue-100 text-lg opacity-80 max-w-xs mx-auto mb-8">You're currently offline, but ShrinkShift works even without internet once installed!</p>
    <button onclick="window.location.reload()" class="bg-white text-blue-700 px-8 py-3 rounded-2xl font-black uppercase tracking-widest shadow-xl active:scale-95 transition-all">Retry Connection</button>
</body>
</html>
